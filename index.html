<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterdeep - Black Ravens Campaign Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0806; --panel:#110e0a; --panel2:#161209; --border:#3a2e1e;
  --gold:#c9a84c; --gold-dim:#7a6030; --raven:#4a9aba; --thread:#c0392b;
  --text:#d4c9b0; --text-dim:#6a6050;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Crimson Text',Georgia,serif; overflow:hidden; }
#app { display:flex; height:100vh; width:100vw; }

#sidebar { width:300px; min-width:300px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:1000; overflow:hidden; }
#sidebar-header { padding:18px 18px 12px; border-bottom:1px solid var(--border); background:var(--panel2); }
#sidebar-header h1 { font-family:'Cinzel',serif; font-size:14px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); }
#sidebar-header p { font-size:11px; color:var(--text-dim); margin-top:3px; letter-spacing:0.06em; }

#search-bar { padding:10px 14px; border-bottom:1px solid var(--border); }
#search-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:2px; padding:7px 10px; color:var(--text); font-family:'Crimson Text',serif; font-size:13px; outline:none; transition:border-color 0.15s; }
#search-input::placeholder { color:var(--text-dim); }
#search-input:focus { border-color:var(--gold-dim); }

#filters { padding:12px 14px; border-bottom:1px solid var(--border); overflow-y:auto; max-height:260px; }
#filters::-webkit-scrollbar { width:3px; }
#filters::-webkit-scrollbar-thumb { background:var(--border); }
.filter-section-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-dim); margin:8px 0 6px; display:block; }
.filter-section-label:first-child { margin-top:0; }
.filter-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; cursor:pointer; user-select:none; }
.filter-row:hover .filter-label { color:var(--text); }
.filter-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; border:1px solid rgba(255,255,255,0.1); transition:box-shadow 0.15s; }
.filter-label { font-size:13px; color:var(--text-dim); transition:color 0.15s; }
.filter-count { margin-left:auto; font-size:11px; color:var(--text-dim); }
.filter-row.active .filter-label { color:var(--text); }
.filter-row.active .filter-dot { box-shadow:0 0 5px currentColor; }
.filter-row.inactive .filter-dot { opacity:0.3; }

#detail-panel { flex:1; overflow-y:auto; display:none; }
#detail-panel.visible { display:block; }
#detail-panel::-webkit-scrollbar { width:3px; }
#detail-panel::-webkit-scrollbar-thumb { background:var(--border); }
.detail-header { padding:14px 16px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); z-index:1; }
.detail-category { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:5px; }
.detail-name { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold); line-height:1.25; padding-right:22px; }
.detail-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; }
.detail-close:hover { color:var(--text); }
.detail-body { padding:12px 16px; }
.detail-meta { font-size:12px; color:var(--text-dim); margin-bottom:6px; line-height:1.5; }
.detail-meta span { color:var(--text); }
.detail-description { font-size:14px; line-height:1.65; color:var(--text); margin:10px 0; font-style:italic; }
.detail-links { display:flex; flex-direction:column; gap:5px; margin-top:10px; }
.detail-link { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:5px 10px; border:1px solid var(--border); color:var(--text-dim); text-decoration:none; border-radius:2px; transition:border-color 0.15s,color 0.15s; }
.detail-link:hover { border-color:var(--gold-dim); color:var(--gold); }
.detail-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
.detail-tag { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; padding:2px 7px; border:1px solid var(--border); color:var(--text-dim); border-radius:2px; }
.volo-stars { color:var(--gold); font-size:11px; }
.thread-badge { display:inline-flex; align-items:center; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--thread); border:1px solid var(--thread); padding:2px 7px; border-radius:2px; margin:4px 4px 0 0; }
.raven-badge { display:inline-flex; align-items:center; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--raven); border:1px solid var(--raven); padding:2px 7px; border-radius:2px; margin:4px 4px 0 0; }

#empty-state { flex:1; display:flex; align-items:center; justify-content:center; padding:24px 18px; }
#empty-state p { font-size:13px; color:var(--text-dim); text-align:center; line-height:1.7; font-style:italic; }

#map { flex:1; background:#06090c; }
.leaflet-container { background:#06090c; font-family:'Crimson Text',serif; }
.leaflet-popup-content-wrapper { background:var(--panel); border:1px solid var(--border); border-radius:3px; box-shadow:0 6px 24px rgba(0,0,0,0.8); color:var(--text); }
.leaflet-popup-tip { background:var(--panel); }
.leaflet-popup-close-button { color:var(--text-dim) !important; top:8px !important; right:8px !important; }
.leaflet-popup-close-button:hover { color:var(--gold) !important; background:none !important; }
.leaflet-popup-content { margin:12px 14px; font-family:'Crimson Text',serif; min-width:160px; }
.popup-name { font-family:'Cinzel',serif; font-size:13px; font-weight:600; color:var(--gold); margin-bottom:3px; padding-right:14px; }
.popup-sub { font-size:11px; color:var(--text-dim); font-family:'Cinzel',serif; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px; }
.popup-ward { font-size:12px; color:var(--text-dim); }
.popup-ward span { color:var(--text); }

.leaflet-control-zoom { border:1px solid var(--border) !important; border-radius:2px !important; }
.leaflet-control-zoom a { background:var(--panel) !important; color:var(--text) !important; border-bottom:1px solid var(--border) !important; width:26px !important; height:26px !important; line-height:26px !important; }
.leaflet-control-zoom a:hover { background:var(--border) !important; color:var(--gold) !important; }
.leaflet-control-attribution { background:rgba(10,8,6,0.85) !important; color:var(--text-dim) !important; font-size:10px !important; }
.leaflet-control-attribution a { color:var(--gold-dim) !important; }

.mk { border-radius:50%; border:1.5px solid rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.6); transition:transform 0.12s,box-shadow 0.12s; font-family:'Cinzel',serif; color:rgba(255,255,255,0.9); }
.mk:hover { transform:scale(1.35); box-shadow:0 3px 12px rgba(0,0,0,0.8); }
.mk-raven { border:2px solid var(--raven) !important; box-shadow:0 0 8px rgba(74,154,186,0.45) !important; }
.mk-thread { border:2px solid var(--thread) !important; box-shadow:0 0 8px rgba(192,57,43,0.45) !important; }

#loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.4s; }
#loading h2 { font-family:'Cinzel',serif; color:var(--gold); font-size:18px; letter-spacing:0.2em; margin-bottom:10px; }
#loading p { font-size:13px; color:var(--text-dim); font-style:italic; }
#loading-bar { width:200px; height:2px; background:var(--border); margin-top:14px; border-radius:1px; overflow:hidden; }
#loading-fill { height:100%; width:0; background:var(--gold); transition:width 0.3s; }
</style>
</head>
<body>

<div id="loading">
  <h2>City of Splendors</h2>
  <p>Charting the wards of Waterdeep...</p>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Waterdeep</h1>
      <p>Black Ravens Campaign &mdash; 1492 DR</p>
    </div>
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Search locations, wards, types..." autocomplete="off" />
    </div>
    <div id="filters"></div>
    <div id="empty-state"><p>Select a marker on the map<br>to view location details.</p></div>
    <div id="detail-panel"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CATS = {
  raven:     { label:'Raven Locations',  color:'#4a9aba', icon:'R', sz:18 },
  thread:    { label:'Open Threads',     color:'#c0392b', icon:'!', sz:16 },
  tavern:    { label:'Tavern',           color:'#c87c3a', icon:'T', sz:13 },
  inn:       { label:'Inn',             color:'#b87040', icon:'I', sz:13 },
  festhall:  { label:'Festhall',         color:'#9a5a7a', icon:'F', sz:13 },
  temple:    { label:'Temple',           color:'#7a5ab0', icon:'+', sz:13 },
  guildhall: { label:'Guildhall',        color:'#5a8a4a', icon:'G', sz:13 },
  shop:      { label:'Shop / Business',  color:'#9a8840', icon:'S', sz:12 },
  residence: { label:'Residence',        color:'#5a7060', icon:'H', sz:11 },
  warehouse: { label:'Warehouse',        color:'#7a6050', icon:'W', sz:11 },
  tomb:      { label:'Tomb',             color:'#505870', icon:'T', sz:11 },
  wdh:       { label:'WDH Location',     color:'#a84040', icon:'D', sz:14 },
  city:      { label:'City / Landmark',  color:'#5a8090', icon:'L', sz:11 },
};

const RAVEN_DATA = [
  { name:"Raven's Roost", cat:'raven', coords:[38.3108,-123.0448], ward:'Temple', isRaven:true, isThread:false,
    description:"Former Trollskull Manor, relocated and renamed. Premium food and drink. Ghost Lif accepted the Ravens on condition it remains a tavern.",
    tags:['home base','tavern','sea lion st','tarnished silver alley'], frw:null, tych:null },
  { name:"Ravens Warehouse", cat:'raven', coords:[38.3106,-123.0445], ward:'Temple', isRaven:true, isThread:false,
    description:"Adjacent to Raven's Roost. Ground floor: 10-stall livery. Upper floor: high-security storage with hidden cellar. Tunnel planned to Roost (100 ft).",
    tags:['home base','livery','storage','tunnel planned'], frw:null, tych:null },
  { name:"Book Wyrm's Treasure", cat:'raven', coords:[38.3112,-123.0452], ward:'Temple', isRaven:true, isThread:false,
    description:"Bookshop owned by Rishaal. Raised Kiron from an egg found in his book vault. Holds restricted texts cited in Dannell's suppressed academic review. Tunnel planned to Raven's Roost (150 ft).",
    tags:['rishaal','kiron','restricted texts','tunnel planned'], frw:null, tych:null },
  { name:"Varkenbluff Museum", cat:'thread', coords:[38.3248,-123.0368], ward:'North', isRaven:false, isThread:true,
    description:"Site of the Chapter 2 heist. Murkmire Stone taken during a Cassalanter-sponsored gala. Darrison Blackwaters (resurrected guard) filed a watch report. Curator Alda Arkin made a private acquisition offer to Kiron. Hooded figure observed outside.",
    tags:['heist','murkmire stone','cassalanters','arkin','darrison','open thread'], frw:null, tych:null },
  { name:"Stonecrusher's Practice", cat:'thread', coords:[38.3155,-123.0398], ward:'Field', isRaven:false, isThread:true,
    description:"Horthnar Stonecrusher, dwarf surgeon. Field Ward practice. High rank in the Collegium of Still Waters - a covert scholarly network preventing any faction from monopolizing destabilizing artifacts.",
    tags:['field ward','stonecrusher','collegium of still waters','open thread'], frw:null, tych:null },
];

// Map init
const MARKER_ZOOM = 15;
const map = L.map('map', {
  minZoom:13, maxZoom:19, zoomSnap:0.25, zoomDelta:0.5,
  maxBounds:[[38.297,-123.070],[38.343,-123.007]],
  maxBoundsViscosity:0.9,
});
map.fitBounds([[38.300730,-123.064884],[38.339302,-123.011881]]);

function updateMarkerVisibility(){
  const z = map.getZoom();
  Object.keys(layers).forEach(cat => {
    if(!activeFilters.has(cat)) return;
    if(z >= MARKER_ZOOM) map.addLayer(layers[cat]);
    else map.removeLayer(layers[cat]);
  });
}
map.on('zoomend', updateMarkerVisibility);

// Tile overlay - geographic projection
const LNG_MIN=-123.064884, LNG_MAX=-123.011881, LAT_MIN=38.300730, LAT_MAX=38.339302;
const COLS=['A','B','C','D','E'], ROWS=11;
const dLng=(LNG_MAX-LNG_MIN)/COLS.length, dLat=(LAT_MAX-LAT_MIN)/ROWS;
// Expand each tile slightly to eliminate seams
const BLEED=0.000015;
COLS.forEach((col,ci)=>{
  for(let row=1;row<=ROWS;row++){
    const lngW=LNG_MIN+ci*dLng-BLEED, lngE=lngW+dLng+BLEED*2;
    const latN=LAT_MAX-(row-1)*dLat+BLEED, latS=latN-dLat-BLEED*2;
    L.imageOverlay(`tiles/Waterdeep_tiles_${col}${row}_10px.webp`,[[latS,lngW],[latN,lngE]]).addTo(map);
  }
});

// Layer groups
const layers={};
Object.keys(CATS).forEach(k=>{ layers[k]=L.layerGroup(); });

const allMarkers=[];

function makeIcon(cat,extra){
  const c=CATS[cat]; const sz=c.sz;
  return L.divIcon({
    className:'',
    html:`<div class="mk${extra?' '+extra:''}" style="width:${sz}px;height:${sz}px;background:${c.color};">${c.icon}</div>`,
    iconSize:[sz,sz], iconAnchor:[sz/2,sz/2], popupAnchor:[0,-(sz/2+4)],
  });
}

function addMarker(name,cat,coords,props,isRaven,isThread){
  const extra=isRaven?'mk-raven':isThread?'mk-thread':'';
  const m=L.marker(coords,{icon:makeIcon(cat,extra)}).addTo(layers[cat]);
  m.on('click',()=>showDetail({name,cat,coords,props,isRaven,isThread}));
  allMarkers.push({name,cat,coords,props,isRaven,isThread,marker:m});
}

// Load geojson
const fill=document.getElementById('loading-fill');
const files=[
  {f:'data/Tavern-Inn-Festhall.geojson', cat:p=>(p.Type||'').toLowerCase().includes('inn')?'inn':(p.Type||'').toLowerCase().includes('festhall')?'festhall':'tavern'},
  {f:'data/Temples.geojson',    cat:()=>'temple'},
  {f:'data/Shops.geojson',      cat:()=>'shop'},
  {f:'data/Residences.geojson', cat:()=>'residence'},
  {f:'data/Guildhalls.geojson', cat:()=>'guildhall'},
  {f:'data/Warehouses.geojson', cat:()=>'warehouse'},
  {f:'data/Tombs.geojson',      cat:()=>'tomb'},
  {f:'data/WDH_Locations.geojson', cat:()=>'wdh'},
  {f:'data/City.geojson',       cat:()=>'city'},
];
let done=0;

Promise.all(files.map(({f,cat})=>
  fetch(f).then(r=>r.json()).then(data=>{
    data.features.forEach(feat=>{
      if(!feat.geometry||feat.geometry.type!=='Point') return;
      const [lng,lat]=feat.geometry.coordinates;
      const p=feat.properties;
      addMarker(p.Name,cat(p),[lat,lng],p,false,false);
    });
    fill.style.width=((++done/files.length)*80)+'%';
  }).catch(e=>console.warn('Failed:',f,e))
)).then(()=>{
  RAVEN_DATA.forEach(loc=>{
    addMarker(loc.name,loc.cat,loc.coords,{
      Ward:loc.ward, _description:loc.description,
      _tags:loc.tags, FRW_Link:loc.frw, Tych_Link:loc.tych
    },loc.isRaven,loc.isThread);
  });
  fill.style.width='100%';
  setTimeout(()=>{ const el=document.getElementById('loading'); el.style.opacity='0'; setTimeout(()=>el.remove(),400); },350);
  buildFilters();
});

// Filters
const activeFilters=new Set(Object.keys(CATS));

function buildFilters(){
  const c=document.getElementById('filters'); c.innerHTML='';
  const campaign=['raven','thread'];
  const canon=Object.keys(CATS).filter(k=>!campaign.includes(k));

  function makeLabel(t){ const s=document.createElement('span'); s.className='filter-section-label'; s.textContent=t; c.appendChild(s); }
  function makeRow(cat){
    const cfg=CATS[cat];
    const count=allMarkers.filter(m=>m.cat===cat).length;
    const row=document.createElement('div');
    row.className='filter-row active'; row.dataset.cat=cat;
    row.innerHTML=`<div class="filter-dot" style="background:${cfg.color};color:${cfg.color};"></div><span class="filter-label">${cfg.label}</span><span class="filter-count">${count}</span>`;
    row.addEventListener('click',()=>{
      if(activeFilters.has(cat)){
        activeFilters.delete(cat); row.classList.replace('active','inactive'); map.removeLayer(layers[cat]);
      } else {
        activeFilters.add(cat); row.classList.replace('inactive','active');
        if(map.getZoom() >= MARKER_ZOOM) map.addLayer(layers[cat]);
      }
    });
    c.appendChild(row);
  }
  makeLabel('Campaign'); campaign.forEach(makeRow);
  makeLabel('Canon');    canon.forEach(makeRow);
}

// Detail panel
const detailPanel=document.getElementById('detail-panel');
const emptyState=document.getElementById('empty-state');

function showDetail({name,cat,props,coords,isRaven,isThread}){
  const c=CATS[cat];
  emptyState.style.display='none';
  detailPanel.classList.add('visible');

  const meta=(label,val)=>val?`<div class="detail-meta">${label}: <span>${val}</span></div>`:'';
  const voloStars=n=>n?`${'★'.repeat(n)}${'☆'.repeat(5-n)}`:'';

  detailPanel.innerHTML=`
    <div class="detail-header">
      <div class="detail-category" style="color:${c.color};">${c.label}</div>
      <div class="detail-name">${name}</div>
      <button class="detail-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-body">
      ${meta('Ward',props.Ward)}
      ${meta('Type',props.Type)}
      ${meta('Deity',props.Deity)}
      ${meta('Guild',props.Guild)}
      ${meta('Season',props.Season)}
      ${props.Volo_Quality?`<div class="detail-meta">Quality: <span class="volo-stars">${voloStars(props.Volo_Quality)}</span></div>`:''}
      ${props.Volo_Price?`<div class="detail-meta">Price: <span class="volo-stars">${voloStars(props.Volo_Price)}</span></div>`:''}
      ${props._description?`<p class="detail-description">${props._description}</p>`:''}
      ${isRaven?'<span class="raven-badge">Raven Connection</span>':''}
      ${isThread?'<span class="thread-badge">Open Thread</span>':''}
      ${[props.FRW_Link?`<a class="detail-link" href="${props.FRW_Link}" target="_blank">Forgotten Realms Wiki</a>`:'',
         props.Tych_Link?`<a class="detail-link" href="${props.Tych_Link}" target="_blank">Tych Maps Battle Map</a>`:'',
         props.Preview_Link?`<a class="detail-link" href="${props.Preview_Link}" target="_blank">Preview Image</a>`:'']
        .filter(Boolean).join('')?`<div class="detail-links">${[props.FRW_Link?`<a class="detail-link" href="${props.FRW_Link}" target="_blank">Forgotten Realms Wiki</a>`:'',props.Tych_Link?`<a class="detail-link" href="${props.Tych_Link}" target="_blank">Tych Maps Battle Map</a>`:'',props.Preview_Link?`<a class="detail-link" href="${props.Preview_Link}" target="_blank">Preview Image</a>`:''].filter(Boolean).join('')}</div>`:''}
      ${(props._tags||[]).length?`<div class="detail-tags">${(props._tags||[]).map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>`:''}
    </div>`;

  map.panTo(coords,{animate:true,duration:0.35});
}

function closeDetail(){ detailPanel.classList.remove('visible'); detailPanel.innerHTML=''; emptyState.style.display=''; }
window.closeDetail=closeDetail;

// Search
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  allMarkers.forEach(({name,cat,props,marker})=>{
    if(!activeFilters.has(cat)) return;
    if(!q){ layers[cat].addLayer(marker); return; }
    const hit=name.toLowerCase().includes(q)
      ||(props.Ward||'').toLowerCase().includes(q)
      ||(props.Type||'').toLowerCase().includes(q)
      ||(props._tags||[]).join(' ').toLowerCase().includes(q);
    hit?layers[cat].addLayer(marker):layers[cat].removeLayer(marker);
  });
});

map.attributionControl.setPrefix('');
map.attributionControl.addAttribution('Map &copy; <a href="https://www.patreon.com/tychmaps" target="_blank">Tych Maps</a> | Unofficial Fan Content | Wizards of the Coast');
</script>
</body>
</html>
