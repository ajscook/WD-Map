<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterdeep - Black Ravens Campaign</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0806;--panel:#110e0a;--panel2:#161209;--border:#2a2010;--border2:#3a3020;
  --gold:#c9a84c;--gold-dim:#7a6030;--teal:#4a9aba;--teal-dim:#2a5a6a;
  --thread:#c0392b;--text:#d4c9b0;--text-dim:#6a6050;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;overflow:hidden;}

/* LAYOUT */
#app{display:flex;height:100vh;width:100vw;}
#map-pane{flex:0 0 70%;height:100vh;position:relative;}
#db-pane{flex:0 0 30%;height:100vh;background:var(--panel);border-left:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;}

/* MAP */
#map{width:100%;height:100%;background:#06090c;}
.leaflet-container{background:#06090c;}
.leaflet-control-zoom{border:1px solid var(--border2) !important;border-radius:2px !important;}
.leaflet-control-zoom a{background:var(--panel) !important;color:var(--text) !important;border-bottom:1px solid var(--border2) !important;width:26px !important;height:26px !important;line-height:26px !important;}
.leaflet-control-zoom a:hover{background:var(--border2) !important;color:var(--gold) !important;}
.leaflet-control-attribution{background:rgba(10,8,6,0.85) !important;color:var(--text-dim) !important;font-size:10px !important;font-family:'Crimson Text',serif !important;}
.leaflet-control-attribution a{color:var(--gold-dim) !important;}
.mk{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:bold;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.7);transition:transform 0.12s;color:rgba(255,255,255,0.9);}
.mk:hover{transform:scale(1.3);}
.mk-raven{border:2px solid var(--teal);box-shadow:0 0 8px rgba(74,154,186,0.5) !important;}
.mk-thread{border:2px solid var(--thread);box-shadow:0 0 8px rgba(192,57,43,0.5) !important;}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid var(--border2);border-radius:3px;box-shadow:0 6px 24px rgba(0,0,0,0.8);}
.leaflet-popup-tip{background:var(--panel);}
.leaflet-popup-close-button{color:var(--text-dim) !important;top:8px !important;right:8px !important;}
.leaflet-popup-close-button:hover{color:var(--gold) !important;background:none !important;}
.leaflet-popup-content{margin:12px 16px;font-family:'Crimson Text',serif;min-width:160px;}
.popup-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px;padding-right:14px;}
.popup-meta{font-size:11px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.popup-notes{font-size:13px;line-height:1.55;color:var(--text);font-style:italic;}
.popup-thread{display:inline-block;margin-top:8px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--thread);border:1px solid var(--thread);padding:2px 6px;border-radius:2px;}

/* DB HEADER */
#db-header{padding:14px 16px 10px;border-bottom:1px solid var(--border2);background:var(--panel2);flex-shrink:0;}
#db-header h2{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);}
#db-header p{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:0.05em;}

/* DB CONTROLS */
#db-controls{padding:8px 12px;border-bottom:1px solid var(--border2);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.ctrl{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:2px;padding:5px 8px;color:var(--text);font-family:'Crimson Text',serif;font-size:13px;outline:none;transition:border-color 0.15s;}
.ctrl:focus{border-color:var(--gold-dim);}
.ctrl::placeholder{color:var(--text-dim);}
select.ctrl{cursor:pointer;}
option{background:#1a1a1a;}
#ctrl-row{display:flex;gap:6px;}
#ctrl-row select{flex:1;}
#db-count{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.15em;color:var(--text-dim);text-align:right;padding:0 12px 6px;}

/* DB TABLE */
#db-scroll{flex:1;overflow-y:auto;}
#db-scroll::-webkit-scrollbar{width:4px;}
#db-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:0;z-index:5;background:var(--panel2);}
th{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border2);cursor:pointer;white-space:nowrap;user-select:none;}
th:hover{color:var(--text);}
th.asc::after{content:" ↑";color:var(--gold);}
th.desc::after{content:" ↓";color:var(--gold);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;cursor:pointer;}
tbody tr:hover{background:rgba(255,255,255,0.03);}
tbody tr.raven-row{border-left:2px solid var(--teal);}
tbody tr.thread-row{border-left:2px solid var(--thread);}
td{padding:6px 10px;vertical-align:middle;}
.td-name{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--gold);line-height:1.3;}
.td-name.raven{color:var(--teal);}
.td-sub{font-size:11px;color:var(--text-dim);margin-top:1px;}
.td-ward{font-size:11px;color:var(--text-dim);white-space:nowrap;}
.td-links{white-space:nowrap;}
.lbtn{display:inline-block;font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 5px;border:1px solid var(--border2);color:var(--text-dim);text-decoration:none;border-radius:2px;margin-right:3px;transition:border-color 0.12s,color 0.12s;}
.lbtn:hover{border-color:var(--gold-dim);color:var(--gold);}
.lbtn.t{border-color:var(--teal-dim);color:var(--teal-dim);}
.lbtn.t:hover{border-color:var(--teal);color:var(--teal);}
.volo{color:var(--gold);font-size:10px;}
.tdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--thread);margin-left:4px;vertical-align:middle;box-shadow:0 0 3px var(--thread);}
#db-empty{text-align:center;padding:40px 16px;color:var(--text-dim);font-style:italic;font-size:13px;display:none;}

/* CAT BADGES */
.cb{display:inline-block;font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.1em;text-transform:uppercase;padding:1px 5px;border-radius:2px;}
.cb-Raven{background:rgba(74,154,186,0.15);color:var(--teal);}
.cb-Tavern{background:rgba(200,124,58,0.12);color:#c87c3a;}
.cb-Temple{background:rgba(122,90,176,0.12);color:#7a5ab0;}
.cb-Shop{background:rgba(154,136,64,0.12);color:#9a8840;}
.cb-Guildhall{background:rgba(90,138,74,0.12);color:#5a8a4a;}
.cb-Residence{background:rgba(90,112,96,0.12);color:#5a7060;}
.cb-Warehouse{background:rgba(122,96,80,0.12);color:#7a6050;}
.cb-Tomb{background:rgba(80,88,112,0.12);color:#505870;}
.cb-WDH-Location{background:rgba(168,64,64,0.12);color:#a84040;}
.cb-Landmark{background:rgba(90,128,144,0.12);color:#5a8090;}
</style>
</head>

<div id="app">

  <div id="map-pane">

  <div id="db-pane">

    <div id="db-controls">

        <select id="db-ward" class="ctrl">

          <option>Field</option><option>Harbour</option><option>North</option>
          <option>Sea</option><option>Southern</option><option>Temple</option>
          <option>Trades</option><option>Undercliff</option>
        </select>
      </div>
      <select id="db-special" class="ctrl">
        <option value="">All Entries</option>
        <option value="raven">Raven Only</option>
        <option value="thread">Open Threads</option>
        <option value="mapped">Tych Mapped</option>
      </select>
    </div>
    <div id="db-count"></div>
    <div id="db-scroll">
      <table id="db-table">
        <thead>
          <tr>
            <th data-col="name">Name</th>
            <th data-col="ward">Ward</th>
            <th data-col="volo_q">Volo</th>
            <th>Links</th>
          </tr>
        </thead>
        <tbody id="db-tbody"></tbody>
      </table>
      <div id="db-empty">No locations match your filters.</div>
    </div>
  </div>
</div>

// ================================================================
// MANUAL MARKERS
// cat: 'raven' | 'thread'
// ================================================================
const MARKERS = [];

// ================================================================
// MAP
// ================================================================
const map = L.map('map',{
  minZoom:13, maxZoom:19, zoomSnap:0.25, zoomDelta:0.5,
  maxBounds:[[38.300,-123.063],[38.346,-123.019]],
  maxBoundsViscosity:0.9,
});
map.setView([38.317471,-123.047803], 18.5);

const LNG_MIN=-123.05816600, LNG_MAX=-123.02383400;
const LAT_MIN=38.30352655,   LAT_MAX=38.34247036;
const COLS=['A','B','C','D','E'], ROWS=11;
const dLng=(LNG_MAX-LNG_MIN)/COLS.length, dLat=(LAT_MAX-LAT_MIN)/ROWS;
const BLEED=0.000015;
COLS.forEach((col,ci)=>{
  for(let row=1;row<=ROWS;row++){
    const lngW=LNG_MIN+ci*dLng-BLEED, lngE=lngW+dLng+BLEED*2;
    const latN=LAT_MAX-(row-1)*dLat+BLEED, latS=latN-dLat-BLEED*2;
    L.imageOverlay(`tiles/Waterdeep_tiles_${col}${row}_10px.webp`,[[latS,lngW],[latN,lngE]]).addTo(map);
  }
});

const MSTYLES={
  raven:{color:'#4a9aba',cls:'mk-raven',sz:18,icon:'R'},
  thread:{color:'#c0392b',cls:'mk-thread',sz:16,icon:'!'},
};
MARKERS.forEach(m=>{
  const s=MSTYLES[m.cat]||MSTYLES.raven;
  const icon=L.divIcon({
    className:'',
    html:`<div class="mk ${s.cls}" style="width:${s.sz}px;height:${s.sz}px;background:${s.color};">${s.icon}</div>`,
    iconSize:[s.sz,s.sz],iconAnchor:[s.sz/2,s.sz/2],popupAnchor:[0,-(s.sz/2+4)],
  });
  L.marker([m.lat,m.lng],{icon}).bindPopup(
    `<div class="popup-name">${m.name}</div>`+
    `<div class="popup-meta">${m.cat}${m.ward?' &mdash; '+m.ward:''}</div>`+
    (m.notes?`<div class="popup-notes">${m.notes}</div>`:'')+
    (m.thread?'<div class="popup-thread">Open Thread</div>':'')
  ).addTo(map);
});

map.attributionControl.setPrefix('');
map.attributionControl.addAttribution('Map &copy; <a href="https://www.patreon.com/tychmaps" target="_blank">Tych Maps</a> | Unofficial Fan Content | Wizards of the Coast');

// ================================================================
// DATABASE
// ================================================================
let sortCol='name', sortDir=1;

function stars(n){
  if(!n) return '';
  return '<span class="volo">'+'★'.repeat(n)+'<span style="opacity:0.2">'+'★'.repeat(5-n)+'</span></span>';
}

function render(){
  const q=document.getElementById('db-search').value.trim().toLowerCase();
  const cat=document.getElementById('db-cat').value;
  const ward=document.getElementById('db-ward').value;
  const special=document.getElementById('db-special').value;

  let rows=DATA.filter(e=>{
    if(cat && e.cat!==cat) return false;
    if(ward && e.ward!==ward) return false;
    if(special==='raven' && !e.raven) return false;
    if(special==='thread' && !e.thread) return false;
    if(special==='mapped' && !e.mapped) return false;
    if(q){
      const hay=(e.name+' '+e.notes+' '+e.type+' '+e.ward).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  rows.sort((a,b)=>{
    if(a.raven&&!b.raven) return -1;
    if(!a.raven&&b.raven) return 1;
    let av=a[sortCol]||'', bv=b[sortCol]||'';
    if(typeof av==='number') return (av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });

  document.getElementById('db-count').textContent=rows.length+' locations';
  document.getElementById('db-empty').style.display=rows.length?'none':'block';
  document.getElementById('db-table').style.display=rows.length?'':'none';

  document.getElementById('db-tbody').innerHTML=rows.map(e=>{
    const cb='cb cb-'+e.cat.replace(/\s+/g,'-');
    const tdot=e.thread?'<span class="tdot"></span>':'';
    const rc=e.thread?'thread-row':e.raven?'raven-row':'';
    const links=[
      e.frw?`<a class="lbtn" href="${e.frw}" target="_blank">FRW</a>`:'',
      e.tych?`<a class="lbtn t" href="${e.tych}" target="_blank">Map</a>`:'',
      e.preview?`<a class="lbtn t" href="${e.preview}" target="_blank">Prev</a>`:'',
    ].join('');
    return `<tr class="${rc}">
      <td><div class="td-name${e.raven?' raven':''}">${e.name}${tdot}</div><div class="td-sub"><span class="${cb}">${e.cat}</span>${e.type?' &nbsp;'+e.type:''}</div></td>
      <td class="td-ward">${e.ward||''}</td>
      <td>${stars(e.volo_q)||''}</td>
      <td class="td-links">${links}</td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col) sortDir*=-1;
    else{sortCol=col;sortDir=1;}
    document.querySelectorAll('th').forEach(t=>t.classList.remove('asc','desc'));
    th.classList.add(sortDir===1?'asc':'desc');
    render();
  });
});

document.getElementById('db-search').addEventListener('input',render);
document.getElementById('db-cat').addEventListener('change',render);
document.getElementById('db-ward').addEventListener('change',render);
document.getElementById('db-special').addEventListener('change',render);

render();
</script>
